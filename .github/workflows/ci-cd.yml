# Saralam CI/CD — single pipeline for develop, qa, prod (branch-based)
name: Saralam CI/CD

on:
  push:
    branches: [develop, qa, main]
  pull_request:
    branches: [develop, qa, main]

jobs:
  # ─── Resolve which environment we are targeting ───────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_env: ${{ steps.env_name.outputs.app_env }}
    steps:
      - id: env_name
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "app_env=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "qa" ]; then
            echo "app_env=qa" >> $GITHUB_OUTPUT
          else
            echo "app_env=develop" >> $GITHUB_OUTPUT
          fi

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    needs: setup
    env:
      APP_ENV: ${{ needs.setup.outputs.app_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # Copy committed .env.<environment> to .env, then overlay secret values.
      # Locally you do: cp .env.develop .env
      - name: Build backend .env from environment file
        run: |
          cd backend
          cp .env.${{ env.APP_ENV }} .env

      - name: Overlay develop secrets
        if: env.APP_ENV == 'develop'
        run: |
          cd backend
          echo "SECRET_KEY=${{ secrets.DEVELOP_SECRET_KEY }}" >> .env
          echo "DB_SERVER=${{ secrets.DEVELOP_DB_SERVER }}" >> .env
          echo "DB_USER=${{ secrets.DEVELOP_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DEVELOP_DB_PASSWORD }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.DEVELOP_RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.DEVELOP_RAZORPAY_KEY_SECRET }}" >> .env
          echo "SMTP_USER=${{ secrets.DEVELOP_SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.DEVELOP_SMTP_PASSWORD }}" >> .env

      - name: Overlay qa secrets
        if: env.APP_ENV == 'qa'
        run: |
          cd backend
          echo "SECRET_KEY=${{ secrets.QA_SECRET_KEY }}" >> .env
          echo "DB_SERVER=${{ secrets.QA_DB_SERVER }}" >> .env
          echo "DB_USER=${{ secrets.QA_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.QA_DB_PASSWORD }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.QA_RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.QA_RAZORPAY_KEY_SECRET }}" >> .env
          echo "SMTP_USER=${{ secrets.QA_SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.QA_SMTP_PASSWORD }}" >> .env

      - name: Overlay prod secrets
        if: env.APP_ENV == 'prod'
        run: |
          cd backend
          echo "SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}" >> .env
          echo "DB_SERVER=${{ secrets.PROD_DB_SERVER }}" >> .env
          echo "DB_USER=${{ secrets.PROD_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.PROD_RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.PROD_RAZORPAY_KEY_SECRET }}" >> .env
          echo "SMTP_USER=${{ secrets.PROD_SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.PROD_SMTP_PASSWORD }}" >> .env

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Run DB migrations
        run: |
          cd backend
          alembic upgrade head
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build -t saralam-backend:${{ env.APP_ENV }}-${{ github.sha }} ./backend
        continue-on-error: true

  # ─── Webapp (saralam_webapp) ───────────────────────────────────────────────
  webapp:
    runs-on: ubuntu-latest
    needs: setup
    env:
      APP_ENV: ${{ needs.setup.outputs.app_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Build webapp .env from environment file + secrets
        run: |
          cd saralam_webapp
          cp .env.${{ env.APP_ENV }} .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          if [ "${{ env.APP_ENV }}" = "develop" ]; then
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.DEVELOP_RAZORPAY_KEY_ID }}" >> .env
          elif [ "${{ env.APP_ENV }}" = "qa" ]; then
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.QA_RAZORPAY_KEY_ID }}" >> .env
          else
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.PROD_RAZORPAY_KEY_ID }}" >> .env
          fi

      - name: Install and build (webapp)
        run: |
          npm ci
          npm run build -w saralam_webapp

      - name: Run tests (webapp)
        run: npm run test -w saralam_webapp -- --run
        continue-on-error: true

  # ─── Admin (saralam_admin) ────────────────────────────────────────────────
  admin:
    runs-on: ubuntu-latest
    needs: setup
    env:
      APP_ENV: ${{ needs.setup.outputs.app_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Build admin .env from environment file + secrets
        run: |
          cd saralam_admin
          cp .env.${{ env.APP_ENV }} .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          if [ "${{ env.APP_ENV }}" = "develop" ]; then
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.DEVELOP_RAZORPAY_KEY_ID }}" >> .env
          elif [ "${{ env.APP_ENV }}" = "qa" ]; then
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.QA_RAZORPAY_KEY_ID }}" >> .env
          else
            echo "VITE_RAZORPAY_KEY_ID=${{ secrets.PROD_RAZORPAY_KEY_ID }}" >> .env
          fi

      - name: Install and build (admin)
        run: |
          npm ci
          npm run build -w saralam_admin

      - name: Run tests (admin)
        run: npm run test -w saralam_admin -- --run
        continue-on-error: true

  # ─── Deploy (only on push, not PRs) ────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [setup, backend, webapp, admin]
    if: github.event_name == 'push'
    env:
      APP_ENV: ${{ needs.setup.outputs.app_env }}
    steps:
      - name: Deploy to Azure (${{ needs.setup.outputs.app_env }})
        run: |
          echo "Deploying saralam to ${{ needs.setup.outputs.app_env }} environment"
          # Add your Azure deployment steps here:
          # az webapp deploy, az acr build, kubectl apply, etc.
